# ===========================================================================
# AI Platform Engine - local development stack.
# Start everything with a single command:
#
#     docker compose --env-file .env.docker up --build
#
# Services: frontend (Vite) + backend (FastAPI) + worker + PostgreSQL/pgvector + Redis + MinIO.
# Credentials and tunables come from the root `.env.docker` file
# (see `.env.docker.example`); every value has a sensible default so the
# stack runs out of the box. Start with:
#
#     cp .env.docker.example .env.docker
#     docker compose --env-file .env.docker up --build
# ===========================================================================

name: ape

services:
  # -------------------------------------------------------------------------
  # React operator console
  #
  # Intentionally has no depends_on: `docker compose up frontend` is a valid
  # frontend-only workflow and renders an actionable API-unavailable state.
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: ape-frontend:dev
    restart: unless-stopped
    init: true
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["pnpm", "dev"]
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # FastAPI backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        INSTALL_DEV: "true"
    image: ape-backend:dev
    restart: unless-stopped
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APE_APP__ENV: ${APE_APP__ENV:-development}
      APE_APP__DEBUG: ${APE_APP__DEBUG:-true}
      APE_RUNTIME__PROFILE: ${APE_RUNTIME__PROFILE:-development}
      APE_LOGGING__LEVEL: ${APE_LOGGING__LEVEL:-INFO}
      APE_LOGGING__RENDER_JSON: ${APE_LOGGING__RENDER_JSON:-false}
      APE_DATABASE__HOST: postgres
      APE_DATABASE__PORT: "5432"
      APE_DATABASE__USER: ${POSTGRES_USER:-ape}
      APE_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-ape}
      APE_DATABASE__NAME: ${POSTGRES_DB:-ape}
      APE_REDIS__HOST: redis
      APE_REDIS__PORT: "6379"
      APE_REDIS__PASSWORD: ${REDIS_PASSWORD:-}
      APE_AUTH__ENABLED: ${APE_AUTH__ENABLED:-false}
      APE_AUTH__ADMIN_API_KEY: ${APE_AUTH__ADMIN_API_KEY:-}
      APE_AUTH__KEY_PEPPER: ${APE_AUTH__KEY_PEPPER:-}
      APE_EMBEDDING__BACKEND: ${APE_EMBEDDING__BACKEND:-hash}
      APE_EMBEDDING__MODEL: ${APE_EMBEDDING__MODEL:-nomic-embed-text}
      APE_EMBEDDING__DIMENSIONS: ${APE_EMBEDDING__DIMENSIONS:-384}
      APE_EMBEDDING__OPENAI_API_KEY: ${APE_EMBEDDING__OPENAI_API_KEY:-}
      APE_EMBEDDING__OPENAI_BASE_URL: ${APE_EMBEDDING__OPENAI_BASE_URL:-https://api.openai.com}
      APE_EMBEDDING__OLLAMA_BASE_URL: ${APE_EMBEDDING__OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      APE_LLM__BACKEND: ${APE_LLM__BACKEND:-echo}
      APE_LLM__MODEL: ${APE_LLM__MODEL:-gpt-4o-mini}
      APE_LLM__OPENAI_API_KEY: ${APE_LLM__OPENAI_API_KEY:-}
      APE_LLM__OPENAI_BASE_URL: ${APE_LLM__OPENAI_BASE_URL:-https://api.openai.com}
      APE_LLM__OLLAMA_BASE_URL: ${APE_LLM__OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      APE_RETRIEVAL__STRATEGY: ${APE_RETRIEVAL__STRATEGY:-hybrid}
      APE_RETRIEVAL__HNSW_EF_SEARCH: ${APE_RETRIEVAL__HNSW_EF_SEARCH:-100}
      APE_MINIO__ENDPOINT: minio:9000
      APE_MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APE_MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APE_MINIO__BUCKET: ${MINIO_BUCKET:-ape-artifacts}
      APE_STORAGE__BACKEND: ${APE_STORAGE__BACKEND:-minio}
      APE_STORAGE__LOCAL_ROOT: /data/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Live-reload for local development.
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "app"]
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # Database migrations (one-shot)
  #
  # Keep schema changes outside the API process so the worker cannot consume
  # jobs against an unmigrated database. This also mirrors production, where
  # migrations run once per deployment rather than once per API replica.
  # -------------------------------------------------------------------------
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        INSTALL_DEV: "true"
    image: ape-backend:dev
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APE_APP__ENV: ${APE_APP__ENV:-development}
      APE_RUNTIME__PROFILE: ${APE_RUNTIME__PROFILE:-development}
      APE_DATABASE__HOST: postgres
      APE_DATABASE__PORT: "5432"
      APE_DATABASE__USER: ${POSTGRES_USER:-ape}
      APE_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-ape}
      APE_DATABASE__NAME: ${POSTGRES_DB:-ape}
      APE_EMBEDDING__DIMENSIONS: ${APE_EMBEDDING__DIMENSIONS:-384}
    command: ["alembic", "upgrade", "head"]
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # Taskiq background worker
  # -------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        INSTALL_DEV: "true"
    image: ape-backend:dev
    restart: unless-stopped
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APE_APP__ENV: ${APE_APP__ENV:-development}
      APE_RUNTIME__PROFILE: ${APE_RUNTIME__PROFILE:-development}
      APE_LOGGING__LEVEL: ${APE_LOGGING__LEVEL:-INFO}
      APE_LOGGING__RENDER_JSON: ${APE_LOGGING__RENDER_JSON:-false}
      APE_DATABASE__HOST: postgres
      APE_DATABASE__PORT: "5432"
      APE_DATABASE__USER: ${POSTGRES_USER:-ape}
      APE_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-ape}
      APE_DATABASE__NAME: ${POSTGRES_DB:-ape}
      APE_REDIS__HOST: redis
      APE_REDIS__PORT: "6379"
      APE_REDIS__PASSWORD: ${REDIS_PASSWORD:-}
      APE_AUTH__ENABLED: ${APE_AUTH__ENABLED:-false}
      APE_AUTH__ADMIN_API_KEY: ${APE_AUTH__ADMIN_API_KEY:-}
      APE_AUTH__KEY_PEPPER: ${APE_AUTH__KEY_PEPPER:-}
      APE_EMBEDDING__BACKEND: ${APE_EMBEDDING__BACKEND:-hash}
      APE_EMBEDDING__MODEL: ${APE_EMBEDDING__MODEL:-nomic-embed-text}
      APE_EMBEDDING__DIMENSIONS: ${APE_EMBEDDING__DIMENSIONS:-384}
      APE_EMBEDDING__OPENAI_API_KEY: ${APE_EMBEDDING__OPENAI_API_KEY:-}
      APE_EMBEDDING__OPENAI_BASE_URL: ${APE_EMBEDDING__OPENAI_BASE_URL:-https://api.openai.com}
      APE_EMBEDDING__OLLAMA_BASE_URL: ${APE_EMBEDDING__OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      APE_LLM__BACKEND: ${APE_LLM__BACKEND:-echo}
      APE_LLM__MODEL: ${APE_LLM__MODEL:-gpt-4o-mini}
      APE_LLM__OPENAI_API_KEY: ${APE_LLM__OPENAI_API_KEY:-}
      APE_LLM__OPENAI_BASE_URL: ${APE_LLM__OPENAI_BASE_URL:-https://api.openai.com}
      APE_LLM__OLLAMA_BASE_URL: ${APE_LLM__OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      APE_RETRIEVAL__STRATEGY: ${APE_RETRIEVAL__STRATEGY:-hybrid}
      APE_RETRIEVAL__HNSW_EF_SEARCH: ${APE_RETRIEVAL__HNSW_EF_SEARCH:-100}
      APE_MINIO__ENDPOINT: minio:9000
      APE_MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APE_MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APE_MINIO__BUCKET: ${MINIO_BUCKET:-ape-artifacts}
      APE_STORAGE__BACKEND: ${APE_STORAGE__BACKEND:-minio}
      APE_STORAGE__LOCAL_ROOT: /data/storage
      APE_JOBS__BACKEND: taskiq
    volumes:
      - ./backend:/app
    command:
      [
        "taskiq",
        "worker",
        "app.worker.broker:broker",
        "app.worker.handlers.document",
        "app.worker.handlers.embedding",
        "app.worker.handlers.indexing",
        "app.worker.handlers.evaluation",
      ]
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:0.8.1-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ape}
      POSTGRES_DB: ${POSTGRES_DB:-ape}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # Redis (cache + background job queue)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # MinIO bucket bootstrap (one-shot)
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}" &&
        mc mb --ignore-existing "local/${MINIO_BUCKET:-ape-artifacts}" &&
        echo "MinIO bucket ready: ${MINIO_BUCKET:-ape-artifacts}"
    networks:
      - ape_network

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ape_network:
    driver: bridge
