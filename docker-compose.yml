# ===========================================================================
# AI Platform Engine - local development stack.
# Start everything with a single command:
#
#     docker compose up --build
#
# Services: backend (FastAPI) + PostgreSQL + Redis + Qdrant + MinIO.
# Credentials and tunables come from the root .env file (see .env.example);
# every value has a sensible default so the stack runs out of the box.
# ===========================================================================

name: ape

services:
  # -------------------------------------------------------------------------
  # FastAPI backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_DEV: "true"
    image: ape-backend:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APE_APP__ENV: ${APE_APP__ENV:-development}
      APE_APP__DEBUG: ${APE_APP__DEBUG:-true}
      APE_LOGGING__LEVEL: ${APE_LOGGING__LEVEL:-INFO}
      APE_LOGGING__RENDER_JSON: ${APE_LOGGING__RENDER_JSON:-false}
      APE_DATABASE__HOST: postgres
      APE_DATABASE__PORT: "5432"
      APE_DATABASE__USER: ${POSTGRES_USER:-ape}
      APE_DATABASE__PASSWORD: ${POSTGRES_PASSWORD:-ape}
      APE_DATABASE__NAME: ${POSTGRES_DB:-ape}
      APE_REDIS__HOST: redis
      APE_REDIS__PORT: "6379"
      APE_QDRANT__HOST: qdrant
      APE_QDRANT__PORT: "6333"
      APE_MINIO__ENDPOINT: minio:9000
      APE_MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APE_MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APE_MINIO__BUCKET: ${MINIO_BUCKET:-ape-artifacts}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Live-reload for local development.
      - ./backend:/app/backend
      - ./alembic.ini:/app/alembic.ini
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ape}
      POSTGRES_DB: ${POSTGRES_DB:-ape}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # Redis (cache + background job queue)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # Qdrant (vector database)
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The Qdrant image ships no curl/wget; use a bash TCP port probe.
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ape_network

  # -------------------------------------------------------------------------
  # MinIO bucket bootstrap (one-shot)
  # -------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}" &&
        mc mb --ignore-existing "local/${MINIO_BUCKET:-ape-artifacts}" &&
        echo "MinIO bucket ready: ${MINIO_BUCKET:-ape-artifacts}"
    networks:
      - ape_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  ape_network:
    driver: bridge
