# ===========================================================================
# Alembic configuration.
# The database URL is intentionally NOT set here; it is injected at runtime
# from the application settings (see backend/app/composition/migrations/env.py) so there
# is a single, environment-driven source of truth for connection details.
# ===========================================================================
[alembic]
script_location = backend/app/composition/migrations
prepend_sys_path = backend
path_separator = os
# Use a timestamped, slug-based naming scheme for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
