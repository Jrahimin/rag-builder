server {
  listen 80;
  server_name _;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  server_tokens off;
  ssl_certificate /run/secrets/tls.crt;
  ssl_certificate_key /run/secrets/tls.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  client_max_body_size 55m;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 5s;
    proxy_read_timeout 180s;
  }

  location = /openapi.json { proxy_pass http://backend:8000/openapi.json; }
  location = /health { proxy_pass http://backend:8000/health; }
  location = /ready { proxy_pass http://backend:8000/ready; }
  location = /metrics { proxy_pass http://backend:8000/metrics; }
  location /operator/ { proxy_pass http://frontend/operator/; }
  location = / { return 302 /operator/; }
}

